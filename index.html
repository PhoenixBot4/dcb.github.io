<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix V9</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: #0f0f13; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h1 { font-size: 28px; margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        
        .sync-btn {
            background: linear-gradient(135deg, #007bff, #00d2ff);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .sync-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.4);
        }
        .install-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #ddd;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Hidden by default, shows when installable */
            width: 100%;
        }
        .install-btn:hover { background: rgba(255,255,255,0.1); }
        #status { margin-top: 20px; font-size: 13px; color: #00d2ff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Phoenix V9</h1>
        <p>Advanced Media Sync Engine</p>

        <!-- Hidden Inputs for PC (Folder) and Mobile (Gallery) -->
        <input type="file" id="desktopInput" webkitdirectory directory multiple style="display: none;">
        <input type="file" id="mobileInput" accept="image/*, video/*" multiple style="display: none;">

        <button class="sync-btn" id="mainSyncBtn">Select & Sync Data</button>
        <button class="install-btn" id="installBtn">📥 Install to Desktop/Home Screen</button>
        
        <div id="status">System Ready.</div>
    </div>

    <script>
        // Check if device is Mobile or PC
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        const mainSyncBtn = document.getElementById('mainSyncBtn');
        const desktopInput = document.getElementById('desktopInput');
        const mobileInput = document.getElementById('mobileInput');
        const statusText = document.getElementById('status');

        mainSyncBtn.addEventListener('click', () => {
            if (isMobile) {
                mobileInput.click(); // Opens Phone Gallery directly
            } else {
                desktopInput.click(); // Opens PC Folder/Drive selector
            }
        });

        // Handle file selection
        const handleFiles = (event) => {
            const files = event.target.files;
            if (files.length > 0) {
                statusText.innerText = `Preparing ${files.length} files for sync...`;
                // Yahan future mein backend par bhejne ka code aayega
                setTimeout(() => {
                    statusText.innerText = "Sync process initiated to Phoenix V9 Database.";
                }, 1500);
            }
        };

        desktopInput.addEventListener('change', handleFiles);
        mobileInput.addEventListener('change', handleFiles);

        // PWA Install Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block'; // Show install button
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Phoenix V9 Service Worker Registered');
            });
        }
    </script>
</body>
</html>
